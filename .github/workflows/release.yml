name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag
        id: get_tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (generate notes, mark latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.get_tag.outputs.tag }}"
          VERSION="${{ steps.get_version.outputs.version }}"
          NOTES_FILE="${RUNNER_TEMP}/release-notes-${TAG}.md"
          gh api -X POST "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$TAG" \
            -f target_commitish="${GITHUB_SHA}" \
            --jq .body > "$NOTES_FILE"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "Release ${VERSION}" \
              --notes-file "$NOTES_FILE" \
              --repo "$GITHUB_REPOSITORY" \
              --latest
          else
            gh release create "$TAG" \
              --title "Release ${VERSION}" \
              --notes-file "$NOTES_FILE" \
              --repo "$GITHUB_REPOSITORY" \
              --latest
          fi

  build:
    name: Build site
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run build
        env:
          VITE_APP_VERSION: ${{ needs.create-release.outputs.version }}
          # GA4 measurement ID (G-XXXXXXXXXX). Not sensitive — it ships in the client
          # bundle — so it lives as a repo Variable, not a Secret. Leave the variable
          # unset to disable analytics (build no-ops). Consent-gated at runtime.
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID }}
          # Pre-launch gate: defaults to gated. Set the repo variable VITE_LAUNCHED=true
          # (and re-tag) to go fully public.
          VITE_LAUNCHED: ${{ vars.VITE_LAUNCHED }}
          VITE_PREVIEW_ALLOWLIST: ${{ secrets.VITE_PREVIEW_ALLOWLIST }}
          # Firebase web config — stored as repo Secrets (kept out of the repo to avoid
          # secret-scanner flags and match house convention). NOTE: a web API key still
          # ships in the client bundle regardless, so also restrict it in GCP
          # (HTTP-referrer allowlist) + Firebase Auth authorized domains.
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}

      - name: Package dist
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.create-release.outputs.version }}"
          BASE="wiab-website-v${VERSION}-dist"
          tar czf "${BASE}.tar.gz" -C dist .
          sha256sum "${BASE}.tar.gz" > "${BASE}.sha256"

      - name: Upload release assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            wiab-website-v${{ needs.create-release.outputs.version }}-dist.tar.gz
            wiab-website-v${{ needs.create-release.outputs.version }}-dist.sha256
          if-no-files-found: error

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  upload:
    name: Upload assets to release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: assets

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${{ needs.create-release.outputs.tag }}" assets/* \
            --clobber --repo "$GITHUB_REPOSITORY"

  deploy:
    name: Deploy to Firebase Hosting (live)
    needs: [create-release, build]
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Deploy to live channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: live
